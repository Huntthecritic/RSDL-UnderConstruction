<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reelspan - Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        .logo {
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 60px;
            color: #666666;
        }

        h1 {
            font-size: clamp(32px, 8vw, 64px);
            font-weight: 300;
            line-height: 1.2;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 16px;
            color: #888888;
            margin-bottom: 50px;
            font-weight: 400;
            line-height: 1.6;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: #cccccc;
            margin: 40px auto;
        }

        .content {
            margin-bottom: 50px;
        }

        .content p {
            font-size: 15px;
            color: #777777;
            line-height: 1.8;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        input[type="email"] {
            padding: 14px 16px;
            font-size: 14px;
            border: 1px solid #dddddd;
            background: #ffffff;
            color: #000000;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input[type="email"]:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }

        input[type="email"]::placeholder {
            color: #bbbbbb;
        }

        button {
            padding: 14px 32px;
            font-size: 14px;
            font-weight: 500;
            background: #000000;
            color: #ffffff;
            border: 1px solid #000000;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-family: inherit;
        }

        button:hover {
            background: #ffffff;
            color: #000000;
        }

        button:active {
            transform: scale(0.98);
        }

        .footer {
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid #eeeeee;
            font-size: 13px;
            color: #aaaaaa;
        }

        .footer a {
            color: #666666;
            text-decoration: none;
            margin: 0 12px;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: #000000;
        }

        @media (max-width: 640px) {
            .logo {
                font-size: 12px;
                margin-bottom: 40px;
            }

            h1 {
                margin-bottom: 16px;
            }

            .divider {
                margin: 30px auto;
            }

            .subtitle {
                margin-bottom: 40px;
            }

            .content p {
                font-size: 14px;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .footer {
                margin-top: 60px;
                padding-top: 30px;
            }

            .footer a {
                display: block;
                margin: 8px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Reelspan</div>
        
        <h1>Under Construction</h1>
        
        <div class="divider"></div>
        
        <div class="content">
            <p class="subtitle">We're building something amazing. Check back soon.</p>
            
            <p>Get notified when we launch</p>
            
            <form class="form-group" onsubmit="handleSubmit(event)">
                <input 
                    type="email" 
                    placeholder="Enter your email" 
                    required
                    aria-label="Email address"
                >
                <button type="submit">Notify Me</button>
            </form>
        </div>

        <div class="footer">
            <a href="mailto:hello@reelspan.com">Contact</a>
            <a href="#twitter">Twitter</a>
            <a href="#instagram">Instagram</a>
        </div>
    </div>

    <script>
        function handleSubmit(event) {
            event.preventDefault();
            const email = event.target.querySelector('input[type="email"]').value;
            alert(`Thanks for your interest! We'll notify you at ${email}`);
            event.target.reset();
        }
    </script>
</body>
</html>
